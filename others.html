<style>
/* ── HOLDER PAGE LAYOUT ── */
.blooming-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
  text-align: center;
  padding: 2rem;
}

/* ── GENTLE FLOAT ANIMATION ── */
.blooming-icon {
  width: 120px;
  height: auto;
  margin-bottom: 2rem;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}

.blooming-text {
  font-family: var(--font-dec);
  font-size: 2.5rem;
  color: var(--ink);
  letter-spacing: 0.05em;
  opacity: 0.8;
}

.blooming-sub {
  font-family: var(--font-body);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: rgba(15, 20, 26, 0.4);
  margin-top: 1rem;
}

@media (max-width: 600px) {
  .blooming-text { font-size: 1.8rem; }
  .blooming-icon { width: 80px; }
}
</style>
</head>
